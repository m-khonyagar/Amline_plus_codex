services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: amline
      POSTGRES_PASSWORD: amline
      POSTGRES_DB: amline
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "${AMLINE_MINIO_PORT:-9000}:9000"
      - "${AMLINE_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
    environment:
      AMLINE_ENV: dev
      AMLINE_BOOTSTRAP_ADMIN_MOBILE: ${AMLINE_BOOTSTRAP_ADMIN_MOBILE:-}
      AMLINE_DATABASE_URL: postgresql+psycopg://amline:amline@postgres:5432/amline
      AMLINE_REDIS_URL: redis://redis:6379/0
      AMLINE_JWT_SECRET: dev-secret-change-me
      AMLINE_JWT_ISSUER: amline
      AMLINE_S3_ENDPOINT_URL: http://minio:9000
      AMLINE_S3_ACCESS_KEY: minio
      AMLINE_S3_SECRET_KEY: minio12345
      AMLINE_S3_BUCKET: amline-docs
      AMLINE_S3_REGION: us-east-1
    ports:
      - "${AMLINE_API_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build:
      context: ./backend
    environment:
      AMLINE_ENV: dev
      AMLINE_BOOTSTRAP_ADMIN_MOBILE: ${AMLINE_BOOTSTRAP_ADMIN_MOBILE:-}
      AMLINE_DATABASE_URL: postgresql+psycopg://amline:amline@postgres:5432/amline
      AMLINE_REDIS_URL: redis://redis:6379/0
      AMLINE_JWT_SECRET: dev-secret-change-me
      AMLINE_JWT_ISSUER: amline
    depends_on:
      - postgres
      - redis
    command: ["sh", "-lc", "python -m app.workers.notification_worker"]

  frontend:
    build:
      context: ./frontend
    environment:
      AMLINE_API_INTERNAL_URL: http://backend:8000
    ports:
      - "${AMLINE_WEB_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
